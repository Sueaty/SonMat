name: Feature
description: Request a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What
      description: What should the user be able to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why does this matter? What problem does it solve?
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where
      description: Which screen or flow is affected?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any context, constraints, or links (Figma, PRD section, etc.)
    validations:
      required: false
