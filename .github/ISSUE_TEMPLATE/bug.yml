name: Bug
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where
      description: Which screen or flow is affected?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Screenshots, logs, device info, etc.
    validations:
      required: false
